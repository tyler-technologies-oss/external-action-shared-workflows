name: Sync Upstream (Reusable)

on:
  workflow_call:
    inputs:
      upstream_owner:
        description: 'Owner of the upstream repository'
        required: true
        type: string
      upstream_repo:
        description: 'Name of the upstream repository'
        required: true
        type: string
      default_branch:
        description: 'Default branch of the upstream repository'
        required: true
        type: string
      force:
        description: 'Force sync even if already up to date'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      pr_created: ${{ steps.create-pr.outputs.pr_created }}
      pr_number: ${{ steps.create-pr.outputs.pr_number }}
      in_sync: ${{ steps.compare.outputs.in_sync }}
      merge_success: ${{ steps.merge.outputs.merge_success }}
      has_security_changes: ${{ steps.security.outputs.has_security_changes }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: upstream-tracking

      - name: Checkout shared-workflows scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tyler-technologies-oss/external-action-shared-workflows
          ref: ${{ github.job_workflow_sha }}
          sparse-checkout: scripts
          path: .shared-workflows

      - name: Add upstream remote
        env:
          UPSTREAM_OWNER: ${{ inputs.upstream_owner }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
        run: git remote add upstream "https://github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}.git"

      - name: Fetch upstream default branch
        env:
          DEFAULT_BRANCH: ${{ inputs.default_branch }}
        run: git fetch upstream "${DEFAULT_BRANCH}"

      - name: Verify upstream repo identity
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_OWNER: ${{ inputs.upstream_owner }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
        run: .shared-workflows/scripts/sync-upstream/verify-upstream-identity.sh

      - name: Compare SHAs
        id: compare
        env:
          DEFAULT_BRANCH: ${{ inputs.default_branch }}
          FORCE: ${{ inputs.force }}
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          UPSTREAM_SHA=$(git rev-parse "upstream/${DEFAULT_BRANCH}")
          echo "current_sha=${CURRENT_SHA}" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"

          if [ "${CURRENT_SHA}" = "${UPSTREAM_SHA}" ] && [ "${FORCE}" != "true" ]; then
            echo "Already in sync"
            echo "in_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "Updates available: ${CURRENT_SHA} -> ${UPSTREAM_SHA}"
            echo "in_sync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Exit early if in sync
        if: steps.compare.outputs.in_sync == 'true'
        run: |
          echo "Fork is already in sync with upstream. Nothing to do."
          exit 0

      - name: Attempt fast-forward merge
        if: steps.compare.outputs.in_sync == 'false'
        id: merge
        env:
          DEFAULT_BRANCH: ${{ inputs.default_branch }}
        run: |
          if git merge --ff-only "upstream/${DEFAULT_BRANCH}"; then
            echo "merge_success=true" >> "$GITHUB_OUTPUT"
          else
            echo "merge_success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open divergence issue on merge failure
        if: steps.compare.outputs.in_sync == 'false' && steps.merge.outputs.merge_success == 'false'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          UPSTREAM_OWNER: ${{ inputs.upstream_owner }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          DEFAULT_BRANCH: ${{ inputs.default_branch }}
        with:
          script: |
            const script = require('./.shared-workflows/scripts/sync-upstream/create-divergence-issue.js');
            await script({ github, context });

      - name: Fail workflow on divergence
        if: steps.compare.outputs.in_sync == 'false' && steps.merge.outputs.merge_success == 'false'
        run: |
          echo "::error::Upstream divergence detected. Fast-forward merge failed."
          exit 1

      - name: Update FORK_MANIFEST.json
        if: steps.compare.outputs.in_sync == 'false' && steps.merge.outputs.merge_success == 'true'
        id: manifest
        env:
          UPSTREAM_SHA_RAW: ${{ steps.compare.outputs.upstream_sha }}
        run: .shared-workflows/scripts/sync-upstream/update-fork-manifest.sh

      - name: Commit manifest update
        if: steps.manifest.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add FORK_MANIFEST.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore: update sync manifest"
          fi

      - name: Push upstream-tracking
        if: steps.compare.outputs.in_sync == 'false' && steps.merge.outputs.merge_success == 'true'
        run: git push origin upstream-tracking

      - name: Generate diff stats
        if: steps.compare.outputs.in_sync == 'false' && steps.merge.outputs.merge_success == 'true'
        id: diff
        env:
          DEFAULT_BRANCH: ${{ inputs.default_branch }}
        run: |
          DIFF_STATS=$(git diff --stat "origin/${DEFAULT_BRANCH}...HEAD")
          DELIMITER="DIFF_$(head -c 16 /dev/urandom | xxd -p)"
          echo "diff_stats<<${DELIMITER}" >> "$GITHUB_OUTPUT"
          echo "${DIFF_STATS}" >> "$GITHUB_OUTPUT"
          echo "${DELIMITER}" >> "$GITHUB_OUTPUT"

      - name: Check for security-relevant changes
        if: steps.compare.outputs.in_sync == 'false' && steps.merge.outputs.merge_success == 'true'
        id: security
        env:
          DEFAULT_BRANCH: ${{ inputs.default_branch }}
        run: .shared-workflows/scripts/sync-upstream/check-security-changes.sh

      - name: Create pull request
        if: steps.compare.outputs.in_sync == 'false' && steps.merge.outputs.merge_success == 'true'
        id: create-pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ inputs.default_branch }}
          UPSTREAM_OWNER: ${{ inputs.upstream_owner }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          DIFF_STATS: ${{ steps.diff.outputs.diff_stats }}
          SECURITY_FILES: ${{ steps.security.outputs.security_files }}
          HAS_SECURITY_CHANGES: ${{ steps.security.outputs.has_security_changes }}
          CURRENT_SHA: ${{ steps.compare.outputs.current_sha }}
          UPSTREAM_SHA: ${{ steps.compare.outputs.upstream_sha }}
        run: .shared-workflows/scripts/sync-upstream/create-sync-pr.sh
