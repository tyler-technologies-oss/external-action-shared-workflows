name: Sync Tags (Reusable)

on:
  workflow_call:
    inputs:
      upstream_owner:
        description: 'Owner of the upstream repository'
        required: true
        type: string
      upstream_repo:
        description: 'Name of the upstream repository'
        required: true
        type: string

jobs:
  check-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout shared-workflows scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tyler-technologies-oss/external-action-shared-workflows
          ref: ${{ github.job_workflow_sha }}
          sparse-checkout: scripts
          path: .shared-workflows

      - name: Fetch upstream tags with SHAs
        id: upstream-tags
        env:
          REMOTE_URL: https://github.com/${{ inputs.upstream_owner }}/${{ inputs.upstream_repo }}.git
          OUTPUT_PREFIX: upstream
        run: bash .shared-workflows/scripts/sync-tags/fetch-tags.sh

      - name: Fetch fork tags with SHAs
        id: fork-tags
        env:
          REMOTE_URL: https://github.com/${{ github.repository }}.git
          OUTPUT_PREFIX: fork
        run: bash .shared-workflows/scripts/sync-tags/fetch-tags.sh

      - name: Find new tags
        id: new-tags
        run: |
          comm -23 /tmp/upstream_tags.txt /tmp/fork_tags.txt > /tmp/new_tags.txt

          NEW_TAG_COUNT=$(wc -l < /tmp/new_tags.txt)
          echo "new_tag_count=${NEW_TAG_COUNT}" >> "$GITHUB_OUTPUT"
          echo "New tags found: ${NEW_TAG_COUNT}"
          cat /tmp/new_tags.txt

      - name: Detect tag mutations
        id: mutations
        run: bash .shared-workflows/scripts/sync-tags/detect-tag-mutations.sh

      - name: Detect tag deletions
        id: deletions
        run: |
          # Tags in fork but NOT in upstream (upstream deleted them)
          comm -13 /tmp/upstream_tags.txt /tmp/fork_tags.txt > /tmp/deleted_upstream_tags.txt

          # Filter out tags that were never in upstream (fork-only tags like local patches)
          # We can only detect this if the tag name matches common upstream patterns
          DELETED_COUNT=$(wc -l < /tmp/deleted_upstream_tags.txt)
          echo "deletion_count=${DELETED_COUNT}" >> "$GITHUB_OUTPUT"

          if [ "${DELETED_COUNT}" -gt 0 ]; then
            echo "Tags in fork but not in upstream: ${DELETED_COUNT}"
            cat /tmp/deleted_upstream_tags.txt
          fi

      - name: Checkout fork for manifest
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          sparse-checkout: FORK_MANIFEST.json
          sparse-checkout-cone-mode: false
          path: .fork-checkout

      - name: Copy manifest to workspace root
        run: cp .fork-checkout/FORK_MANIFEST.json FORK_MANIFEST.json 2>/dev/null || true

      - name: Verify pinned tags against manifest
        id: manifest-check
        run: bash .shared-workflows/scripts/sync-tags/verify-pinned-tags.sh

      - name: Create alerts for manifest drift
        if: steps.manifest-check.outputs.drift_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRIFT_DATA: ${{ steps.manifest-check.outputs.drift_details }}
        run: bash .shared-workflows/scripts/sync-tags/create-drift-alerts.sh

      - name: Create issues for new tags
        if: steps.new-tags.outputs.new_tag_count != '0'
        id: create-issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_OWNER: ${{ inputs.upstream_owner }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
        run: bash .shared-workflows/scripts/sync-tags/create-new-tag-issues.sh

      - name: Create alerts for tag mutations
        if: steps.mutations.outputs.mutation_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MUTATED_DATA: ${{ steps.mutations.outputs.mutated_tags }}
          UPSTREAM_OWNER: ${{ inputs.upstream_owner }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
        run: bash .shared-workflows/scripts/sync-tags/create-mutation-alerts.sh

      - name: Create alerts for tag deletions
        if: steps.deletions.outputs.deletion_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_OWNER: ${{ inputs.upstream_owner }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
        run: bash .shared-workflows/scripts/sync-tags/create-deletion-alerts.sh

      - name: Summary
        env:
          NEW_TAG_COUNT: ${{ steps.new-tags.outputs.new_tag_count }}
          MUTATION_COUNT: ${{ steps.mutations.outputs.mutation_count }}
          DELETION_COUNT: ${{ steps.deletions.outputs.deletion_count }}
          DRIFT_COUNT: ${{ steps.manifest-check.outputs.drift_count }}
          ISSUES_CREATED: ${{ steps.create-issues.outputs.issues_created }}
        run: |
          echo "## Sync Tags Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **New tags found:** ${NEW_TAG_COUNT:-0}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag mutations detected:** ${MUTATION_COUNT:-0}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag deletions detected:** ${DELETION_COUNT:-0}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pinned tag drift detected:** ${DRIFT_COUNT:-N/A}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Issues created:** ${ISSUES_CREATED:-0}" >> "$GITHUB_STEP_SUMMARY"
